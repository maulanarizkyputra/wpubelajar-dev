<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Galau</title>
    <style>
      body {
        font-family: "Courier New", Courier, monospace;
        font-weight: bold;
        color: #f8f8ff;
        text-align: center;
        background-color: rgb(15, 22, 41);
      }
      h1 {
        font-size: 48px;
        text-transform: uppercase;
        font-style: italic;
        letter-spacing: 10px;
        text-decoration: underline;
        text-decoration-style: wavy;
        text-decoration-color: rgb(69, 80, 88);
        text-shadow: 5px 2px 0px rgba(7, 78, 91, 0.995);
        color: rgb(49, 171, 245);
      }
      quote {
        font-size: 22px;
        line-height: 2.2;
        word-spacing: 5px;
        width: 400px;
      }
      span {
        text-decoration: line-through;
        color: rgb(206, 2, 2);
      }
      .cover {
        font-size: 12px;
        letter-spacing: 2px;
        color: rgba(74, 79, 93, 0.7);
      }
    </style>
  </head>
  <body>
    <h1>Fase Runtuh</h1>
    <p class="quote">
      Tak perlu khawatir, ku hanya <span>terluka</span>.<br />
      Terbiasa tuk pura-pura tertawa.
    </p>
    <p>
      Namun bolehkah sekali saja ku menangis?<br />
      Sebelum kembali membohongi diri."
    </p>
    <p class="cover">feby putri feat. fiersa besari</p>
  </body>
</html>
