<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Galau</title>
    <style>
      body {
        font-family: "Courier New", Courier, monospace;
        font-weight: bold;
        color: rgb(60, 60, 60);
        text-align: center;
      }
      h1 {
        font-size: 48px;
        text-transform: uppercase;
        font-style: italic;
        letter-spacing: 10px;
        text-decoration: underline;
        text-decoration-style: wavy;
        text-decoration-color: rgb(99, 99, 99);
        text-shadow: 5px 2px 0px rgba(59, 58, 58, 0.5);
      }
      quote {
        font-size: 22px;
        line-height: 2.2;
        word-spacing: 5px;
        width: 400px;
      }
      span {
        text-decoration: line-through;
        color: rgb(181, 181, 181);
      }
      .cover {
        font-size: 12px;
        letter-spacing: 2px;
        color: rgb(135, 134, 134);
      }
    </style>
  </head>
  <body>
    <h1>Fase Runtuh</h1>
    <p class="quote">
      Tak perlu khawatir, ku hanya <span>terluka</span>.<br />
      Terbiasa tuk pura-pura tertawa.
    </p>
    <p>
      Namun bolehkah sekali saja ku menangis?<br />
      Sebelum kembali membohongi diri."
    </p>
    <p class="cover">feby putri feat. fiersa besari</p>
  </body>
</html>
